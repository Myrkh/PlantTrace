name: Release

# Déclenché quand on pousse un tag de version, ex: git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into sources
        shell: bash
        run: |
          v="${{ steps.version.outputs.version }}"
          sed -i "s/^__version__ = .*/__version__ = \"${v}\"/" src/planttrace/__init__.py
          sed -i "s/^version = .*/version = \"${v}\"/" pyproject.toml

      - name: Install
        run: python -m pip install -e .[dev,package]

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -p no:cacheprovider tests

      - name: Build executable
        run: python -m PyInstaller --noconfirm --clean packaging/PlantTrace.spec

      - name: Package zip
        shell: pwsh
        run: Compress-Archive -Path dist/PlantTrace -DestinationPath PlantTrace-${{ github.ref_name }}-win64.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PlantTrace-${{ github.ref_name }}-win64.zip
          generate_release_notes: true
